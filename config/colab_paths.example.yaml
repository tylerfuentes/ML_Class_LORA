repo:
  clone_url: "https://github.com/nathanaelguitar/ML_Class_LORA.git"
  branch: "main"
  worktree: "/content/ML_Class_LORA"

drive:
  root: "/content/drive/MyDrive/ML_Class_LORA"
  data_gold: "/content/drive/MyDrive/ML_Class_LORA/data/gold"
  adapters: "/content/drive/MyDrive/ML_Class_LORA/adapters"
  checkpoints: "/content/drive/MyDrive/ML_Class_LORA/checkpoints"
  outputs: "/content/drive/MyDrive/ML_Class_LORA/outputs"
  manifests: "/content/drive/MyDrive/ML_Class_LORA/manifests"

datasets:
  train_file: "/content/drive/MyDrive/ML_Class_LORA/data/gold/train.jsonl"
  train_eval_file: "/content/drive/MyDrive/ML_Class_LORA/data/gold/train_eval.jsonl"
  val_file: "/content/drive/MyDrive/ML_Class_LORA/data/gold/val.jsonl"
  test_file: "/content/drive/MyDrive/ML_Class_LORA/data/gold/test.jsonl"

model:
  model_id: "Qwen/Qwen3.6-27B"
  local_files_only: false

training:
  run_name: "colab-a100-qwen36-27b-unsloth"
  epochs: 1.0
  learning_rate: 0.0002
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  eval_steps: 5000
  save_steps: 5000
  logging_steps: 100
  max_seq_length: 1024
  gpu_memory_utilization: 0.95
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.0
  max_total_examples: 0
  disable_qlora: false

evaluation:
  output_subdir: "evals"
  max_new_tokens: 96
  benchmark_split_size: 128
  qwen_thinking_mode: "nonthinking"

huggingface:
  final_adapter_repo: "your-username/your-private-qwen36-27b-finance-lora"
  private: true
  enable_upload_env: "ENABLE_HF_UPLOAD"
  token_env: "HF_TOKEN"
